<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Light blue fill for whole circle -->
  <circle cx="256" cy="256" r="232" fill="#C8DCFA"/>

  <!-- Upper half slightly darker -->
  <path d="M24 256 A232 232 0 0 1 488 256 Z" fill="#A8C8F5"/>

  <!-- Horizontal band (white strip around center line) -->
  <rect x="24" y="238" width="464" height="36" fill="white"/>

  <!-- Outer concentric ring (Great Ball style) in upper area -->
  <clipPath id="upper"><rect x="0" y="0" width="512" height="238"/></clipPath>
  <circle cx="256" cy="256" r="162" stroke="#1A6BFF" stroke-width="18" fill="none" clip-path="url(#upper)"/>

  <!-- Center button -->
  <circle cx="256" cy="256" r="60" fill="white"/>
  <circle cx="256" cy="256" r="44" fill="#C8DCFA"/>
  <circle cx="256" cy="256" r="24" fill="#A8C8F5"/>

  <!-- Outer border -->
  <circle cx="256" cy="256" r="232" stroke="#1A6BFF" stroke-width="22"/>

  <!-- Horizontal center line -->
  <line x1="24" y1="256" x2="488" y2="256" stroke="#1A6BFF" stroke-width="22"/>

  <!-- Center button ring -->
  <circle cx="256" cy="256" r="60" stroke="#1A6BFF" stroke-width="18"/>
</svg>
